version: "3.9"

services:
  # WebRTC Signaling Server
  teleop-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: teleop-server
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "443:443"  # HTTPS (optional, requires SSL certs)
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      # Authentication (change these in production!)
      - AUTH_ENABLED=true
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=teleop123
      # SSL Configuration (uncomment and set paths for HTTPS)
      # - SSL_CERT_FILE=/certs/fullchain.pem
      # - SSL_KEY_FILE=/certs/privkey.pem
      # - SSL_PASSWORD=
      # ICE/TURN Server Configuration
      - ICE_SERVERS=["turn:47.242.85.149:3478?transport=udp","turn:47.242.85.149:3478?transport=tcp","stun:47.242.85.149:3478"]
    volumes:
      # Mount SSL certificates (uncomment for HTTPS)
      # - ./certs:/certs:ro
      # Optional: mount static files for live updates during development
      - ./src/server/static:/app/src/server/static:ro
    networks:
      - teleop-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # TURN/STUN Server (coturn) - Optional, run on same machine
  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    restart: unless-stopped
    network_mode: host  # Required for TURN to work properly with real IPs
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    env_file:
      - turn.env
    # Note: coturn needs host networking for proper NAT traversal
    # Ports used: 3478 (STUN/TURN), 5349 (TURN TLS), 49152-65535 (relay)

networks:
  teleop-net:
    driver: bridge
